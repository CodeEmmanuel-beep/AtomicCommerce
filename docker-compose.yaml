services:
 db:
  image: postgres:16-alpine
  container_name: marketplace_db
  restart: always
  environment:
   POSTGRES_USER: ${DB_USER:-user}
   POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
   POSTGRES_DB: ${DB_NAME:-name}
  volumes:
    - postgres_data:/var/lib/postgresql/data
  healthcheck:
   test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-name}"]
   interval: 5s
   timeout: 5s
   retries: 5
  networks:
   - backend

 redis:
  image: redis:7-alpine
  container_name: marketplace_redis
  restart: always
  healthcheck:
   test: ["CMD", "redis-cli", "ping"]
   interval: 5s
   timeout: 5s
   retries: 5
  networks:
   - backend

 e_marketplace:
  build: .
  container_name: marketplace_api
  volumes:
   - .:/app
   - ./logs:/app/logs
  ports:
   - 8000:8000
  env_file:
   - .env
  environment:
   DATABASE_URL: ${DATABASE_URL}
   REDIS_URL: ${REDIS_URL}
   SUPABASE_URL: ${SUPABASE_URL}
   SUPABASE_KEY: ${SUPABASE_KEY}
  depends_on:
   db:
    condition: service_healthy
   redis:
    condition: service_healthy
  networks:
   - backend

networks:
 backend:
  driver: bridge
volumes:
 postgres_data:
